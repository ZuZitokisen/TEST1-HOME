<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tokimeki Tool Box</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/screens.css">
</head>
<body>
  <div id="app" class="app">
    <main id="homeScreen" class="screen active screen-home" data-screen="home">
      <button id="home39Button" class="logo-button logo-home" type="button" aria-label="ホームロゴ 39">
        <img src="./assets/logos/39.png" alt="39">
      </button>
    </main>

    <main id="toolSelectScreen" class="screen screen-tools" data-screen="tools" aria-hidden="true">
      <button id="tool38Button" class="logo-button logo-tool tool-top" type="button" aria-label="Tokimeki Toreca Maker 38">
        <img src="./assets/logos/38.png" alt="38">
      </button>
      <button id="tool40Button" class="logo-button logo-tool tool-bottom" type="button" aria-label="Tokimeki Time Marker 40">
        <img src="./assets/logos/40.png" alt="40">
      </button>
    </main>

    <section id="trecaScreen" class="screen screen-tool-frame" data-screen="treca" aria-hidden="true">
      <header class="tool-header">
        <button class="tool-logo-menu" type="button" data-menu-button="treca" aria-label="Tokimeki Toreca Maker menu">
          <img src="./assets/logos/35.png" alt="35">
        </button>
      </header>
      <iframe class="tool-frame" src="./tools/treca.html" title="Tokimeki Toreca Maker"></iframe>
    </section>

    <section id="timeMarkerScreen" class="screen screen-tool-frame" data-screen="timemarker" aria-hidden="true">
      <header class="tool-header">
        <button class="tool-logo-menu" type="button" data-menu-button="timemarker" aria-label="Tokimeki Time Marker menu">
          <img src="./assets/logos/37.png" alt="37">
        </button>
      </header>
      <iframe class="tool-frame" src="./tools/time-marker.html" title="Tokimeki Time Marker"></iframe>
    </section>

    <div id="dropdownMenu" class="dropdown-menu hidden" role="menu" aria-hidden="true">
      <button type="button" data-menu-action="home">ホーム</button>
      <button type="button" data-menu-action="settings">設定</button>
    </div>

    <div id="settingsModal" class="modal hidden" aria-hidden="true">
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="settingsTitle" class="modal-title">設定</h2>
          <button id="settingsCloseBtn" type="button" class="icon-close" aria-label="26CLOSE">
            <img src="./assets/logos/26.png" alt="26CLOSE">
          </button>
        </div>
        <div id="settingsBody" class="settings-list"></div>
      </div>
    </div>

    <div id="permissionModal" class="modal hidden" aria-hidden="true">
      <div class="modal-panel modal-panel-small">
        <h2 id="permissionTitle" class="modal-title">権限が必要です</h2>
        <p id="permissionMessage" class="modal-text"></p>
        <div class="modal-actions">
          <button id="permissionCancelBtn" type="button" class="secondary-btn">キャンセル</button>
          <button id="permissionOpenSettingsBtn" type="button" class="primary-btn">設定を開く</button>
        </div>
      </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
      <div class="loading-box">出力中…</div>
    </div>

    <div id="toast" class="toast hidden" aria-live="polite"></div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/router.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/share.js"></script>
  <script src="./js/bridge.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
